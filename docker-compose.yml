
services:
  postgres:
    image: postgres:19beta1
    container_name: learning-db-postgres
    environment:
      POSTGRES_DB: learningdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"   # host 5433: llm-postgres owns host 5432
    volumes:
      - postgres_data:/var/lib/postgresql   # PG18+: mount the parent dir (versioned subdir layout)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d learningdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
